<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .header {
            padding: 20px 40px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 28px; color: #4facfe; }
        .header .status { font-size: 14px; color: #888; }
        .header .account-info { font-size: 12px; color: #4facfe; }
        
        .container {
            display: flex;
            height: calc(100vh - 80px);
        }
        
        .sidebar {
            width: 420px;
            background: rgba(0,0,0,0.4);
            overflow-y: auto;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: rgba(0,0,0,0.3);
            border: none;
            color: #888;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab:hover, .tab:focus, .tab.active {
            background: rgba(79,172,254,0.2);
            color: #4facfe;
        }
        .tab.active { border-bottom: 2px solid #4facfe; }
        
        /* Login Forms */
        .login-section {
            padding: 20px;
            display: none;
        }
        .login-section.active { display: block; }
        
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 13px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(79,172,254,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 15px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 15px rgba(79,172,254,0.3);
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover, .btn:focus {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(79,172,254,0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
        }
        
        /* Category Navigation */
        .category-nav {
            display: none;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .category-nav.active { display: flex; gap: 10px; flex-wrap: wrap; }
        .cat-btn {
            padding: 8px 16px;
            background: rgba(79,172,254,0.2);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }
        .cat-btn:hover, .cat-btn:focus, .cat-btn.active {
            background: #4facfe;
        }
        
        /* Channel List */
        .channels { padding: 10px; display: none; }
        .channels.active { display: block; }
        
        .channel-item {
            padding: 12px 15px;
            margin: 4px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .channel-item:hover, .channel-item:focus, .channel-item.selected {
            background: rgba(79,172,254,0.3);
            outline: 2px solid #4facfe;
        }
        .channel-logo {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover;
            background: #333;
        }
        .channel-info { flex: 1; }
        .channel-name { font-size: 15px; font-weight: 500; }
        .channel-num { font-size: 12px; color: #888; }
        
        /* Video Player */
        .player-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .video-container {
            flex: 1;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        #player {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .now-playing {
            padding: 15px 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            margin-top: 15px;
        }
        .now-playing h3 { color: #4facfe; margin-bottom: 5px; }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #4facfe;
        }
        
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #666;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: #4facfe; border-radius: 4px; }
        
        *:focus { outline: 3px solid #00f2fe; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📺 IPTV Player</h1>
        <div>
            <div class="status" id="status">Select login method</div>
            <div class="account-info" id="accountInfo"></div>
        </div>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <!-- Tabs -->
            <div class="tabs" id="tabs">
                <button class="tab active" onclick="showTab('xtream')" tabindex="1">Xtream Login</button>
                <button class="tab" onclick="showTab('m3u')" tabindex="2">M3U URL</button>
            </div>
            
            <!-- Xtream Login -->
            <div class="login-section active" id="xtreamLogin">
                <div class="form-group">
                    <label>Server URL</label>
                    <input type="text" id="serverUrl" placeholder="http://example.com:8080" tabindex="3">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Your username" tabindex="4">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Your password" tabindex="5">
                </div>
                <button class="btn" onclick="loginXtream()" tabindex="6">Connect</button>
                <button class="btn btn-secondary" onclick="loadSavedCredentials()" tabindex="7" style="margin-top:10px">Load Saved</button>
            </div>
            
            <!-- M3U Login -->
            <div class="login-section" id="m3uLogin">
                <div class="form-group">
                    <label>M3U Playlist URL</label>
                    <input type="text" id="playlistUrl" placeholder="http://example.com/playlist.m3u" tabindex="10">
                </div>
                <button class="btn" onclick="loadM3U()" tabindex="11">Load Playlist</button>
            </div>
            
            <!-- Category Navigation -->
            <div class="category-nav" id="categoryNav"></div>
            
            <!-- Channel List -->
            <div class="channels" id="channelList">
                <div class="empty-state">
                    Connect to your IPTV service to see channels
                </div>
            </div>
        </div>
        
        <div class="player-section">
            <div class="video-container">
                <video id="player" controls></video>
                <div class="loading" id="loading" style="display:none;">Loading...</div>
            </div>
            <div class="now-playing">
                <h3>Now Playing</h3>
                <div id="nowPlaying">Select a channel to start watching</div>
            </div>
        </div>
    </div>

    <script>
        // State
        let channels = [];
        let categories = [];
        let currentCategory = null;
        let currentIndex = -1;
        let xtreamConfig = null;
        
        const player = document.getElementById('player');
        const loading = document.getElementById('loading');
        
        // Tab switching
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.login-section').forEach(s => s.classList.remove('active'));
            
            if (tab === 'xtream') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('xtreamLogin').classList.add('active');
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('m3uLogin').classList.add('active');
            }
        }
        
        // Xtream Codes Login
        async function loginXtream() {
            let server = document.getElementById('serverUrl').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!server || !username || !password) {
                alert('Please fill in all fields');
                return;
            }
            
            // Clean up server URL
            server = server.replace(/\/$/, '');
            if (!server.startsWith('http')) {
                server = 'http://' + server;
            }
            
            document.getElementById('status').textContent = 'Connecting...';
            
            try {
                // Get account info
                const authUrl = server + '/player_api.php?username=' + username + '&password=' + password;
                const authResponse = await fetch(authUrl);
                const authData = await authResponse.json();
                
                if (authData.user_info && authData.user_info.auth === 1) {
                    xtreamConfig = { server, username, password };
                    
                    // Save credentials
                    localStorage.setItem('xtreamConfig', JSON.stringify(xtreamConfig));
                    
                    // Show account info
                    const expDate = authData.user_info.exp_date 
                        ? new Date(authData.user_info.exp_date * 1000).toLocaleDateString()
                        : 'Unlimited';
                    document.getElementById('accountInfo').textContent = 
                        'Status: ' + authData.user_info.status + ' | Expires: ' + expDate;
                    
                    // Load live categories
                    await loadXtreamCategories();
                    
                } else {
                    throw new Error('Authentication failed');
                }
                
            } catch (error) {
                document.getElementById('status').textContent = 'Error: ' + error.message;
                alert('Login failed: ' + error.message);
            }
        }
        
        // Load Xtream Categories
        async function loadXtreamCategories() {
            if (!xtreamConfig) return;
            
            document.getElementById('status').textContent = 'Loading categories...';
            
            try {
                const url = xtreamConfig.server + '/player_api.php?username=' + xtreamConfig.username + 
                           '&password=' + xtreamConfig.password + '&action=get_live_categories';
                
                const response = await fetch(url);
                categories = await response.json();
                
                // Hide tabs and login, show categories
                document.getElementById('tabs').style.display = 'none';
                document.getElementById('xtreamLogin').style.display = 'none';
                
                renderCategories();
                document.getElementById('status').textContent = categories.length + ' categories loaded';
                
                // Load first category
                if (categories.length > 0) {
                    loadXtreamChannels(categories[0].category_id);
                }
                
            } catch (error) {
                document.getElementById('status').textContent = 'Error loading categories';
            }
        }
        
        // Render categories
        function renderCategories() {
            const nav = document.getElementById('categoryNav');
            nav.classList.add('active');
            
            let html = '<button class="cat-btn" onclick="logout()" tabindex="20">← Logout</button>';
            
            let tabIndex = 21;
            categories.forEach(cat => {
                html += '<button class="cat-btn" data-id="' + cat.category_id + '" onclick="loadXtreamChannels(\'' + cat.category_id + '\')" tabindex="' + tabIndex++ + '">' + 
                        cat.category_name + '</button>';
            });
            
            nav.innerHTML = html;
        }
        
        // Load channels for category
        async function loadXtreamChannels(categoryId) {
            if (!xtreamConfig) return;
            
            currentCategory = categoryId;
            
            // Update active category button
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.id === categoryId);
            });
            
            document.getElementById('status').textContent = 'Loading channels...';
            
            try {
                const url = xtreamConfig.server + '/player_api.php?username=' + xtreamConfig.username + 
                           '&password=' + xtreamConfig.password + '&action=get_live_streams&category_id=' + categoryId;
                
                const response = await fetch(url);
                const streams = await response.json();
                
                // Convert to our channel format
                channels = streams.map((stream, index) => ({
                    name: stream.name,
                    url: xtreamConfig.server + '/live/' + xtreamConfig.username + '/' + xtreamConfig.password + '/' + stream.stream_id + '.m3u8',
                    logo: stream.stream_icon || '',
                    num: stream.num || index + 1,
                    epgId: stream.epg_channel_id
                }));
                
                document.getElementById('status').textContent = channels.length + ' channels';
                renderChannels();
                
            } catch (error) {
                document.getElementById('status').textContent = 'Error loading channels';
            }
        }
        
        // Render channels
        function renderChannels() {
            const container = document.getElementById('channelList');
            container.classList.add('active');
            
            if (channels.length === 0) {
                container.innerHTML = '<div class="empty-state">No channels in this category</div>';
                return;
            }
            
            let html = '';
            let tabIndex = 100;
            
            channels.forEach((ch, index) => {
                const logoHtml = ch.logo 
                    ? '<img class="channel-logo" src="' + ch.logo + '" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>📺</text></svg>\'">'
                    : '<div class="channel-logo" style="display:flex;align-items:center;justify-content:center;font-size:24px;">📺</div>';
                
                html += '<div class="channel-item" tabindex="' + tabIndex++ + '" onclick="playChannel(' + index + ')" data-index="' + index + '">';
                html += logoHtml;
                html += '<div class="channel-info">';
                html += '<div class="channel-name">' + ch.name + '</div>';
                html += '<div class="channel-num">#' + ch.num + '</div>';
                html += '</div></div>';
            });
            
            container.innerHTML = html;
        }
        
        // Play channel
        function playChannel(index) {
            if (index < 0 || index >= channels.length) return;
            
            currentIndex = index;
            const channel = channels[index];
            
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('selected'));
            document.querySelector('[data-index="' + index + '"]')?.classList.add('selected');
            document.getElementById('nowPlaying').textContent = channel.name;
            document.getElementById('status').textContent = 'Playing: ' + channel.name;
            
            loading.style.display = 'block';
            player.src = channel.url;
            player.play().then(() => {
                loading.style.display = 'none';
            }).catch(err => {
                loading.style.display = 'none';
                console.error('Playback error:', err);
            });
        }
        
        // M3U Playlist loading
        async function loadM3U() {
            const url = document.getElementById('playlistUrl').value.trim();
            if (!url) {
                alert('Please enter a playlist URL');
                return;
            }
            
            document.getElementById('status').textContent = 'Loading playlist...';
            
            try {
                const response = await fetch(url);
                const content = await response.text();
                channels = parseM3U(content);
                
                if (channels.length === 0) {
                    throw new Error('No channels found');
                }
                
                localStorage.setItem('lastM3uUrl', url);
                
                document.getElementById('tabs').style.display = 'none';
                document.getElementById('m3uLogin').style.display = 'none';
                
                // Group by category
                const groups = {};
                channels.forEach(ch => {
                    if (!groups[ch.group]) groups[ch.group] = [];
                    groups[ch.group].push(ch);
                });
                
                categories = Object.keys(groups).map(name => ({ category_id: name, category_name: name }));
                renderCategories();
                
                // Show all channels
                document.getElementById('channelList').classList.add('active');
                renderChannels();
                
                document.getElementById('status').textContent = channels.length + ' channels loaded';
                
            } catch (error) {
                document.getElementById('status').textContent = 'Error: ' + error.message;
                alert('Failed to load: ' + error.message);
            }
        }
        
        // Parse M3U
        function parseM3U(content) {
            const lines = content.split('\n');
            const items = [];
            let currentItem = null;
            
            for (const line of lines) {
                const trimmed = line.trim();
                
                if (trimmed.startsWith('#EXTINF:')) {
                    currentItem = { name: '', url: '', logo: '', group: 'Uncategorized', num: items.length + 1 };
                    
                    const commaIndex = trimmed.lastIndexOf(',');
                    if (commaIndex !== -1) {
                        currentItem.name = trimmed.substring(commaIndex + 1).trim();
                    }
                    
                    const logoMatch = trimmed.match(/tvg-logo="([^"]+)"/);
                    if (logoMatch) currentItem.logo = logoMatch[1];
                    
                    const groupMatch = trimmed.match(/group-title="([^"]+)"/);
                    if (groupMatch) currentItem.group = groupMatch[1];
                    
                } else if (trimmed && !trimmed.startsWith('#') && currentItem) {
                    currentItem.url = trimmed;
                    items.push(currentItem);
                    currentItem = null;
                }
            }
            
            return items;
        }
        
        // Logout
        function logout() {
            xtreamConfig = null;
            channels = [];
            categories = [];
            
            document.getElementById('tabs').style.display = 'flex';
            document.getElementById('xtreamLogin').style.display = 'block';
            document.getElementById('categoryNav').classList.remove('active');
            document.getElementById('channelList').classList.remove('active');
            document.getElementById('channelList').innerHTML = '<div class="empty-state">Connect to see channels</div>';
            document.getElementById('accountInfo').textContent = '';
            document.getElementById('status').textContent = 'Logged out';
            
            player.pause();
            player.src = '';
        }
        
        // Load saved credentials
        function loadSavedCredentials() {
            const saved = localStorage.getItem('xtreamConfig');
            if (saved) {
                const config = JSON.parse(saved);
                document.getElementById('serverUrl').value = config.server;
                document.getElementById('username').value = config.username;
                document.getElementById('password').value = config.password;
                document.getElementById('status').textContent = 'Credentials loaded - click Connect';
            } else {
                alert('No saved credentials found');
            }
        }
        
        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            switch(e.keyCode) {
                case 461: // Back (webOS)
                case 8:   // Backspace
                    if (player.src) {
                        player.pause();
                        player.src = '';
                        document.getElementById('nowPlaying').textContent = 'Select a channel';
                        e.preventDefault();
                    }
                    break;
                case 415: player.play(); break;  // Play
                case 19:  player.pause(); break; // Pause
                case 413: // Stop
                    player.pause();
                    player.src = '';
                    break;
            }
        });
        
        // Player error handling
        player.addEventListener('error', function() {
            loading.style.display = 'none';
            document.getElementById('status').textContent = 'Playback error';
        });
        
        // Auto-load saved M3U URL
        const lastM3u = localStorage.getItem('lastM3uUrl');
        if (lastM3u) {
            document.getElementById('playlistUrl').value = lastM3u;
        }
    </script>
</body>
</html>
