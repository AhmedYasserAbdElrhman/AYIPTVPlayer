<div class="vplayer" style="display:none;">
    <video class="vplayer__video" playsinline></video>

    <div class="vplayer__loading">
        <div class="vplayer__spinner"></div>
    </div>

    <div class="vplayer__overlay">
        <div class="vplayer__info">
            <div class="vplayer__title"></div>
            <div class="vplayer__subtitle"></div>
        </div>

        <div class="vplayer__controls">
            <div class="vplayer__progress-track" tabindex="-1">
                <div class="vplayer__progress-fill"></div>
            </div>

            <div class="vplayer__controls-row">
                <button class="vplayer__nav-btn vplayer__prev-btn" tabindex="-1">⏮</button>
                <button class="vplayer__play-btn" tabindex="-1">
                    <span class="vplayer__play-icon"></span>
                </button>
                <button class="vplayer__nav-btn vplayer__next-btn" tabindex="-1">⏭</button>
                <div></div>
                <div class="vplayer__time-info">
                    <span class="vplayer__time-current">0:00</span>
                    <span class="vplayer__time-sep">/</span>
                    <span class="vplayer__time-total">0:00</span>
                </div>
                <span class="vplayer__live-badge">LIVE</span>
            </div>
        </div>
    </div>

    <div class="vplayer__error">
        <span class="vplayer__error-icon">✕</span>
        <span class="vplayer__error-text">Playback error</span>
    </div>
</div>
