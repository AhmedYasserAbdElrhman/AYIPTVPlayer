<div class="resume-alert">
    <div class="resume-alert__content">
        <div class="resume-alert__icon">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21"/>
            </svg>
        </div>
        <div class="resume-alert__body">
            <h3 class="resume-alert__title">Continue watching?</h3>
            <p class="resume-alert__text">Resume from <span class="resume-alert__time">0:00</span></p>
        </div>
        <div class="resume-alert__buttons">
            <button class="resume-alert__btn focused" id="resume-yes">Yes</button>
            <button class="resume-alert__btn" id="resume-no">No</button>
        </div>
    </div>
    <p class="resume-alert__hint">Auto-dismiss in 8s</p>
</div>
