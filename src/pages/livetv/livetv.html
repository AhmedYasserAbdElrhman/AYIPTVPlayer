<div class="livetv-page">

    <!-- Background — static gradients, no blur -->
    <div class="home-bg">
        <div class="home-bg__orb home-bg__orb--1"></div>
        <div class="home-bg__orb home-bg__orb--2"></div>
        <div class="home-bg__orb home-bg__orb--3"></div>
        <div class="home-bg__grid"></div>
    </div>

    <div class="livetv-layout">

        <!-- Top Bar -->
        <div class="livetv-topbar">
            <div class="livetv-topbar__left">
                <button class="livetv-back focusable" id="btn-back"
                        data-focus-row="0" data-focus-col="0">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <h1 class="livetv-topbar__title">Live TV</h1>
                <span class="livetv-topbar__count" id="channel-count">0 channels</span>
            </div>
            <div class="livetv-topbar__right">
                <span class="livetv-topbar__time" id="topbar-time">--:--</span>
            </div>
        </div>

        <!-- Main Content: Sidebar + Channel Grid -->
        <div class="livetv-body">

            <!-- Categories Sidebar -->
            <div class="livetv-sidebar" id="sidebar">
                <div class="livetv-sidebar__header">
                    <span class="livetv-sidebar__label">Categories</span>
                </div>
                <div class="livetv-sidebar__list" id="category-list">
                    <!-- Category items injected here -->
                </div>
            </div>

            <!-- Channel Grid -->
            <div class="livetv-grid-wrap">
                <div class="livetv-grid" id="channel-grid">
                    <!-- Channel items rendered by VirtualList or direct append -->
                </div>
                <div class="livetv-empty" id="grid-empty" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="7" width="20" height="15" rx="2" ry="2"/>
                        <polyline points="17 2 12 7 7 2"/>
                    </svg>
                    <span>No channels found</span>
                </div>
            </div>

        </div>

        <!-- Now Playing Bar (visible when mini player active) -->
        <div class="livetv-nowplaying" id="now-playing" style="display:none;">
            <div class="livetv-nowplaying__info">
                <span class="livetv-nowplaying__dot"></span>
                <span class="livetv-nowplaying__name" id="np-name">---</span>
            </div>
            <div class="livetv-nowplaying__actions">
                <button class="livetv-nowplaying__btn focusable" id="btn-fullscreen"
                        data-focus-row="3" data-focus-col="0">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 3 21 3 21 9"/>
                        <polyline points="9 21 3 21 3 15"/>
                        <line x1="21" y1="3" x2="14" y2="10"/>
                        <line x1="3" y1="21" x2="10" y2="14"/>
                    </svg>
                    Fullscreen
                </button>
                <button class="livetv-nowplaying__btn livetv-nowplaying__btn--stop focusable"
                        id="btn-stop" data-focus-row="3" data-focus-col="1">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="6" y="6" width="12" height="12" rx="1"/>
                    </svg>
                    Stop
                </button>
            </div>
        </div>

    </div>

    <!-- Video Player Container (managed by VideoPlayer component) -->
    <div id="player-container"></div>

</div>
