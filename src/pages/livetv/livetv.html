<div class="livetv-page">

    <!-- Background -->
    <div class="home-bg">
        <div class="home-bg__orb home-bg__orb--1"></div>
        <div class="home-bg__orb home-bg__orb--2"></div>
        <div class="home-bg__orb home-bg__orb--3"></div>
        <div class="home-bg__grid"></div>
    </div>

    <div class="livetv-layout">

        <!-- Top Bar -->
        <div class="livetv-topbar">
            <div class="livetv-topbar__left">
                <button class="livetv-back" id="btn-back">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <h1 class="livetv-topbar__title">Live TV</h1>
                <span class="livetv-topbar__count" id="channel-count"></span>
            </div>
            <div class="livetv-topbar__right">
                <span class="livetv-topbar__time" id="topbar-time">--:--</span>
            </div>
        </div>

        <!-- Body: Sidebar + Channels + Player -->
        <div class="livetv-body">

            <!-- Sidebar -->
            <div class="livetv-sidebar">
                <div class="livetv-search" id="cat-search-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="cat-search" placeholder="Search categories…" autocomplete="off"/>
                </div>
                <div class="livetv-sidebar__list" id="category-list"></div>
            </div>

            <!-- Channel List (single column, VirtualList manages content) -->
            <div class="livetv-channels">
                <div class="livetv-search" id="ch-search-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="ch-search" placeholder="Search channels…" autocomplete="off"/>
                </div>
                <div class="livetv-chlist" id="channel-list"></div>
                <div class="livetv-empty" id="grid-empty" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="7" width="20" height="15" rx="2" ry="2"/>
                        <polyline points="17 2 12 7 7 2"/>
                    </svg>
                    <span>No channels found</span>
                </div>
            </div>

            <!-- Player Panel (right side, inline) -->
            <div class="player-panel" id="player-panel">
                <!-- Player slot — goes fullscreen via CSS class, NOT DOM moves -->
                <div class="player-panel__video" id="player-slot"></div>
                <div class="player-panel__info">
                    <div class="player-panel__badge">
                        <span class="player-panel__dot"></span>
                        LIVE
                    </div>
                    <span class="player-panel__name" id="player-ch-name">No channel selected</span>
                </div>
                <div class="player-panel__hint">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 3 21 3 21 9"/>
                        <polyline points="9 21 3 21 3 15"/>
                        <line x1="21" y1="3" x2="14" y2="10"/>
                        <line x1="3" y1="21" x2="10" y2="14"/>
                    </svg>
                    <span>Press OK to fullscreen</span>
                </div>
                <button class="player-panel__stop" id="player-stop">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="6" y="6" width="12" height="12" rx="1"/>
                    </svg>
                    Stop
                </button>
            </div>

        </div>
    </div>
</div>
