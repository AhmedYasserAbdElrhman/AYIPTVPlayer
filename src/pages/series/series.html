<div class="media-page">

    <!-- Background -->
    <div class="home-bg">
        <div class="home-bg__orb home-bg__orb--1"></div>
        <div class="home-bg__orb home-bg__orb--2"></div>
        <div class="home-bg__orb home-bg__orb--3"></div>
        <div class="home-bg__grid"></div>
    </div>

    <div class="media-layout">

        <!-- Top Bar -->
        <div class="media-topbar">
            <div class="media-topbar__left">
                <button class="livetv-back" id="btn-back">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <h1 class="media-topbar__title" id="page-title">Series</h1>
                <span class="media-topbar__count" id="item-count">0 items</span>
            </div>
            <div class="media-topbar__right">
                <span class="livetv-topbar__time" id="topbar-time">--:--</span>
            </div>
        </div>

        <!-- Body: Sidebar + Grid -->
        <div class="media-body">

            <!-- Categories Sidebar -->
            <div class="livetv-sidebar" id="sidebar">
                <div class="livetv-sidebar__header">
                    <span class="livetv-sidebar__label">Categories</span>
                </div>
                <div class="livetv-sidebar__list" id="category-list"></div>
            </div>

            <!-- Content Grid -->
            <div class="media-grid-wrap">
                <!-- Search bar -->
                <div class="media-search" id="grid-search-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="grid-search" placeholder="Search series…" autocomplete="off"/>
                </div>
                <div class="media-grid" id="content-grid"></div>
                <div class="livetv-empty" id="grid-empty" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="8" width="16" height="12" rx="2"/>
                        <rect x="6" y="5" width="12" height="3" rx="1" opacity="0.6"/>
                        <rect x="8" y="2" width="8" height="3" rx="1" opacity="0.3"/>
                    </svg>
                    <span>No series found</span>
                </div>
                <div class="media-loading" id="grid-loading" style="display:none;">
                    <div class="media-loading__spinner"></div>
                    <span>Loading…</span>
                </div>
            </div>

        </div>

    </div>

    <!-- Player mount point -->
    <div id="player-container"></div>

</div>
