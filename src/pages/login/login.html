<div class="login-page">

    <!-- Animated Background -->
    <div class="login-bg">
        <div class="login-bg__orb login-bg__orb--1"></div>
        <div class="login-bg__orb login-bg__orb--2"></div>
        <div class="login-bg__orb login-bg__orb--3"></div>
        <div class="login-bg__grid"></div>
    </div>

    <!-- Login Card -->
    <div class="login-card">

        <!-- Header -->
        <div class="login-header">
            <div class="login-header__icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 6h-7.59l3.29-3.29L16 2l-4 4-4-4-.71.71L10.59 6H3c-1.1 
                    0-2 .89-2 2v12c0 1.1.9 2 2 2h18c1.1 0 2-.9 
                    2-2V8c0-1.11-.9-2-2-2zm0 14H3V8h18v12zM9 10v8l7-4z"/>
                </svg>
            </div>
            <h1 class="login-header__title">IPTV Player</h1>
            <p class="login-header__subtitle">Enter your Xtream Codes credentials</p>
        </div>

        <!-- Form -->
        <form class="login-form" id="login-form" autocomplete="off">

            <!-- Host -->
            <div class="input-group" id="group-host">
                <label class="input-group__label" for="input-host">Server Host</label>
                <div class="input-group__wrapper">
                    <input
                        type="text"
                        class="input-group__input focusable"
                        id="input-host"
                        placeholder="example.com or IP address"
                        data-focus-index="0"
                        inputmode="url"
                    >
                    <svg class="input-group__icon" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                        <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
                        <line x1="6" y1="6" x2="6.01" y2="6"/>
                        <line x1="6" y1="18" x2="6.01" y2="18"/>
                    </svg>
                </div>
                <span class="input-group__error">Server host is required</span>
            </div>

            <!-- Port -->
            <div class="input-group" id="group-port">
                <label class="input-group__label" for="input-port">Port</label>
                <div class="input-group__wrapper">
                    <input
                        type="text"
                        class="input-group__input focusable"
                        id="input-port"
                        placeholder="8080"
                        data-focus-index="1"
                        inputmode="numeric"
                    >
                    <svg class="input-group__icon" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                </div>
                <span class="input-group__error">Port is required</span>
            </div>

            <!-- Username -->
            <div class="input-group" id="group-username">
                <label class="input-group__label" for="input-username">Username</label>
                <div class="input-group__wrapper">
                    <input
                        type="text"
                        class="input-group__input focusable"
                        id="input-username"
                        placeholder="Your username"
                        data-focus-index="2"
                    >
                    <svg class="input-group__icon" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <span class="input-group__error">Username is required</span>
            </div>

            <!-- Password -->
            <div class="input-group" id="group-password">
                <label class="input-group__label" for="input-password">Password</label>
                <div class="input-group__wrapper">
                    <input
                        type="password"
                        class="input-group__input focusable"
                        id="input-password"
                        placeholder="Your password"
                        data-focus-index="3"
                    >
                    <svg class="input-group__icon" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <span class="input-group__error">Password is required</span>
            </div>

            <!-- SSL Toggle -->
            <div class="toggle-group">
                <span class="toggle-group__label">Use SSL (HTTPS)</span>
                <div class="toggle focusable" id="toggle-ssl"
                     data-focus-index="4" role="switch" aria-checked="false">
                    <div class="toggle__knob"></div>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="login-btn focusable"
                    id="btn-login" data-focus-index="5">
                <span class="login-btn__text">Connect</span>
                <div class="login-btn__spinner"></div>
            </button>
        </form>

        <!-- Status -->
        <div class="login-status" id="login-status"></div>

        <!-- Footer -->
        <div class="login-footer">
            Use <kbd>▲</kbd> <kbd>▼</kbd> to navigate &nbsp;·&nbsp; <kbd>OK</kbd> to select
        </div>
    </div>
</div>
